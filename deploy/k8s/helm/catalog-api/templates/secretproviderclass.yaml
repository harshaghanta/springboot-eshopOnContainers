{{- $name:= include "catalog-api.fullname" . -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: spc-{{$name}}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ .Values.vault.address | quote }}
    roleName: {{ .Values.vault.address | quote }}
    objects: |
      - objectName: DB_USER_NAME
        secretPath: internal/data/database/config
        secretKey: DB_USER_NAME
      - objectName: DB_PASSWORD
        secretPath: internal/data/database/config
        secretKey: DB_PASSWORD