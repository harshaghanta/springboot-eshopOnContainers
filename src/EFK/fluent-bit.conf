[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    storage.path /fluent-bit/state/storage

[INPUT]
    Name              tail
    Path              /app/logs/catalog-api*.log
    Tag               catalog-api
    Parser            springboot_json
    DB                /fluent-bit/state/catalog-api.db
    Refresh_Interval  5
    Read_from_Head    On
    storage.type      filesystem

[INPUT]
    Name              tail
    Path              /app/logs/basket-api*.log
    Tag               basket-api
    Parser            springboot_json
    DB                /fluent-bit/state/basket-api.db
