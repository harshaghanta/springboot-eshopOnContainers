[OUTPUT]
    Name                es
    Match               catalog-api
    Host                elasticsearch
    Port                9200
    Index               catalog-api
    Logstash_Format     On
    Logstash_Prefix     catalog-api
    Suppress_Type_Name  On
    Generate_ID         On
    Replace_Dots        On

