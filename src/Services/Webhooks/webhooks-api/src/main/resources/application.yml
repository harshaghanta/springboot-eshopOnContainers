spring:
  application:
    name: webhooks-api
  profiles:
    active:
    - local
  jpa:
    hibernate:
      ddl-auto: update
      naming.physical-strategy: "org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl"
      naming.implicit-strategy: "org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl"
  autoconfigure:
    exclude:
    - net.ttddyy.observation.boot.autoconfigure.DataSourceObservationAutoConfiguration


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true


  #enable management endpoints
management:
  server:
    port: 8081
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server: 
            requests: true
  tracing:
    enabled: false
  # tracing:
  #   sampling:
  #     probability: 1.0
        
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.eshoponcontainers.eventbus: DEBUG