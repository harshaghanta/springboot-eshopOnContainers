spring:
  application:
    name: catalog-api
  profiles:
    active:
    - local
  jpa:
    hibernate:
      ddl-auto: update
      naming.physical-strategy: "org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl"
      naming.implicit-strategy: "org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl"

  grpc:
    server:
      port: ${CATALOG_GRPC_PORT:50001}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true


  #enable management endpoints
management:
  server:
    port: 8081
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server: 
            requests: true
  tracing:
    enabled: false
  # tracing:
  #   sampling:
  #     probability: 1.0
        
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true

  # zipkin:
  #   tracing:
  #     endpoint: http://tempo:9411/api/v2/spans

picBaseUrl: "https://harshaghanta.github.io/springboot-eshopOnContainers/resources/catalog/images/[0]"